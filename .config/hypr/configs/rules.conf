dwindle {
  pseudotile = true
  preserve_split = true
  force_split = 2
}

windowrule {
  # Ignore maximize requests from all apps. You'll probably like this.
  name = suppress-maximize-events
  match:class = .*

  suppress_event = maximize
}

windowrule {
  # Fix some dragging issues with XWayland
  name = fix-xwayland-drags
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false

  no_focus = true
}


# Effects
windowrule = no_blur on, no_shadow on, match:class ^vktablet$

# Workspaces
windowrule = workspace 1, match:class ^helium$
windowrule = workspace 9, match:class ^obsidian$
windowrule = workspace 10, match:class ^[Ss]potify$

# Float
windowrule = float on, match:class ^ezame$
windowrule = float on, match:class ^vktablet$
windowrule = float on, match:class ^nwg-look$
windowrule = float on, match:class ^nwg-displays$
windowrule = float on, match:class ^org.gnome.NautilusPreviewer$

windowrule = float on, match:title ^_crx_(.*)$
windowrule = float on, match:title ^Rename(.*)$
windowrule = float on, match:title ^Extract(.*)$
windowrule = float on, match:title ^Compress(.*)$
windowrule = float on, match:title ^Save File(|s)$
windowrule = float on, match:title ^Open File(|s)$
windowrule = float on, match:title ^File Operation Progress(.*)$

# No transparent
windowrule = opacity 1.0 override, match:class ^imv$
windowrule = opacity 1.0 override, match:class ^mpv$
windowrule = opacity 1.0 override, match:class ^scrcpy$
windowrule = opacity 1.0 override, match:class ^krita$
windowrule = opacity 1.0 override, match:class ^osu(.)$
windowrule = opacity 1.0 override, match:class ^sober$
windowrule = opacity 1.0 override, match:class ^(.*)(Sober)$
windowrule = opacity 1.0 override, match:class ^(.*)[Mm]inecraft(.*)$

windowrule = opacity 1.0 override, match:title ^(.*)Immich(.*)$
windowrule = opacity 1.0 override, match:title ^(.*)[Yy]ou[Tt]ube(.*)$

# Layer blur
layerrule = ignore_alpha 0, blur on, match:namespace rofi
layerrule = ignore_alpha 0, blur on, match:namespace menu
layerrule = ignore_alpha 0, blur on, match:namespace waybar
layerrule = ignore_alpha 0, blur on, match:namespace notifications

layerrule = no_anim on,          match:namespace selection
layerrule = no_anim on,          match:namespace hyprpicker
layerrule = animation slide top, match:namespace notifications
