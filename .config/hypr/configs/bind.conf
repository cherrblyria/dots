binds {
  scroll_event_delay = 0
}

gesture = 3, vertical,             workspace
gesture = 3, swipe,                move
gesture = 3, swipe,    mod: Alt,   resize
gesture = 2, pinchout, mod: Alt, float, float
gesture = 2, pinchin,  mod: Alt, float, tile


### APPS
bindu = Alt,   Space,  exec, $drun
bindu = Super, Return, exec, $term
bindu = Super, T,      exec, $fterm
bindu = Super, E,      exec, $file
bindu = Super, R,      exec, $run

bindu = Super, A, submap, apps
submap = apps, reset # Submap Start

bind = , F, exec, $term
bind = , E, exec, $file
bind = , T, exec, $term tmux a
bind = , N, exec, $term nvim

bind = , B, exec, $browser
bind = , O, exec, obsidian
bind = , D, exec, vesktop
bind = , S, exec, spotify

bind = ,      C, exec, hyprpicker -a
bind = Shift, B, exec, $f $term bluetui
bind = Shift, T, exec, $f $term btop
bind = Shift, N, exec, $f $term nmtui
bind = Shift, M, exec, $f $term pulsemixer

bindl = , Escape, submap, reset
submap = reset # Submap End


### SYSTEM
bindu   = Super, V,     exec, $clip
binduel = Super, Space, exec, $s/kbl.sh

bindu = Super, S, submap, system
submap = system, reset # Submap Start

bind = , S, exec, $s/sys.sh
bind = , A, exec, $s/lg.sh
bind = , W, exec, $f $term $s/wal.sh
bind = , R, exec, $s/reload.sh
bind = , L, exec, hyprlock

bind = Shift, Delete, exec, $shutdown

bindl = , Escape, submap, reset
submap = reset # Submap End


### WINDOW
bindu = Super, Z,         easymotion, action:hyprctl dispatch focuswindow address:{}
bindu = Super, Q,         killactive,
bindu = ,      F11,       fullscreen, 0
bindu = Super, Backslash, exec, hyprctl --batch 'dispatch resizeactive exact 80% 75%; dispatch centerwindow;'

bindue = Alt, Tab, cyclenext,
bindue = Alt, Tab, bringactivetotop,
bindue = Alt, Tab, changegroupactive, f

bindum = Super, mouse:272, movewindow
bindum = Super, mouse:273, resizewindow

bind = Super, H, movefocus, l
bind = Super, J, movefocus, d
bind = Super, K, movefocus, u
bind = Super, L, movefocus, r

bind = Super Shift, H, movewindoworgroup, l
bind = Super Shift, J, movewindoworgroup, d
bind = Super Shift, K, movewindoworgroup, u
bind = Super Shift, L, movewindoworgroup, r

binde = Super Ctrl, H, resizeactive, -25 0
binde = Super Ctrl, J, resizeactive,  0  25
binde = Super Ctrl, K, resizeactive,  0 -25
binde = Super Ctrl, L, resizeactive,  25 0

binde = Super Shift Ctrl, H, resizeactive, -50 0
binde = Super Shift Ctrl, J, resizeactive,  0  50
binde = Super Shift Ctrl, K, resizeactive,  0 -50
binde = Super Shift Ctrl, L, resizeactive,  50 0

bindu = Super, W, submap, window
submap = window, reset # Submap Start

bind = , Space, togglefloating,
bind = , R,     exec, hyprctl --batch 'dispatch resizeactive exact 80% 75%; dispatch centerwindow;'
bind = , C,     centerwindow
bind = , F,     fullscreen, 0
bind = , M,     fullscreen, 1
bind = , P,     pseudo,
bind = , S,     layoutmsg, togglesplit

bindl = , Escape, submap, reset
submap = reset # Submap End


### GROUP
bind = Super, G, submap, group
submap = group, reset # Submap Start

bind = , Space, togglegroup,
bind = , S,     lockactivegroup, toggle

bind = , H, changegroupactive, b
bind = , L, changegroupactive, f

bind = Shift, H,     movegroupwindow, b
bind = Shift, L,     movegroupwindow,

bindl = , Escape, submap, reset
submap = reset # Submap End


### WORKSPACE
bindu = Super, mouse_up, workspace, e+1
bindu = Super, mouse_down, workspace, e-1

binde = Super, Tab, workspace, e+1
binde = Super Shift, Tab, workspace, e-1

bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10

bind = Super Shift, 1, movetoworkspace, 1
bind = Super Shift, 2, movetoworkspace, 2
bind = Super Shift, 3, movetoworkspace, 3
bind = Super Shift, 4, movetoworkspace, 4
bind = Super Shift, 5, movetoworkspace, 5
bind = Super Shift, 6, movetoworkspace, 6
bind = Super Shift, 7, movetoworkspace, 7
bind = Super Shift, 8, movetoworkspace, 8
bind = Super Shift, 9, movetoworkspace, 9
bind = Super Shift, 0, movetoworkspace, 10


### SCREENSHOT
bindul = ,      Print, exec, hyprshot -m region           -t 1000 $screenshot_output
bindul = Alt,   Print, exec, hyprshot -m window -m active -t 1000 $screenshot_output
bindul = Shift, Print, exec, hyprshot -m output -m active -t 1000 $screenshot_output
bindul = Ctrl,  Print, exec, $s/rec.sh


### ZOOM
binde = Super, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = Super, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = Super, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = Super, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

bind = Super Ctrl, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.8) | if . < 1 then 1 else . end')
bind = Super Ctrl, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.2')

bind = Super Shift, minus, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = Super Shift, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = Super Shift, 0, exec, hyprctl -q keyword cursor:zoom_factor 1


### LAPTOP BUTTON
binduel = ,      XF86AudioRaiseVolume,  exec, $s/vol.sh up
binduel = ,      XF86AudioLowerVolume,  exec, $s/vol.sh down
binduel = Shift, XF86AudioRaiseVolume,  exec, $s/vol.sh lup
binduel = Shift, XF86AudioLowerVolume,  exec, $s/vol.sh ldown
binduel = ,      XF86AudioMute,         exec, $s/vol.sh mute
binduel = ,      XF86AudioMicMute,      exec, $s/vol.sh mic-mute

binduel = ,      XF86MonBrightnessUp,   exec, $s/bl.sh up
binduel = ,      XF86MonBrightnessDown, exec, $s/bl.sh down
binduel = Shift, XF86MonBrightnessUp,   exec, $s/bl.sh lup
binduel = Shift, XF86MonBrightnessDown, exec, $s/bl.sh ldown


### MUSIC
bindul = , XF86AudioNext,  exec, $s/music.sh next
bindul = , XF86AudioPause, exec, $s/music.sh playpause
bindul = , XF86AudioPlay,  exec, $s/music.sh playpause
bindul = , XF86AudioPrev,  exec, $s/music.sh previous

bindul = Super Alt, N, exec, $s/music.sh next
bindul = Super Alt, P, exec, $s/music.sh playpause
bindul = Super Alt, B, exec, $s/music.sh previous
