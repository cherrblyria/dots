## Options
binds {
  scroll_event_delay = 0
  workspace_back_and_forth = true
}

## Gesture
gesture = 3, vertical, workspace

## !! My alt and super are swapped (MacOS-like)
$Cmd = Super

## Programs
bind = $Cmd,       Return, exec, $term
bind = $Cmd,       E,      exec, $file
bind = $Cmd Shift, E,      exec, $fileAlt
bind = $Cmd,       B,      exec, $browser
bind = $Cmd,       N,      exec, $editor

bind = $Cmd Shift, C,      exec, hyprpicker -a
bind = $Cmd Shift, B,      exec, $f $t bluetui
bind = $Cmd Shift, M,      exec, $f $t pulsemixer

## Rofi
bind = $Cmd, Space,  exec, $drun
bind = $Cmd, R,      exec, $run
bind = $Cmd, V,      exec, $clip
bind = $Cmd, Period, exec, $emoji

## System
bindl = Alt,        Space,  exec, $s/keyboardlayout.sh
bind  = $Cmd,       A,      exec, $s/lookup.sh
bind  = $Cmd,       I,      exec, pkill -SIGUSR1 waybar

binde = $Cmd Shift, N,      exec, notify-send "бµ•М€в™ЎЛіаі«Лљв€— Haii >w< Л–в—›вЃєв‘…в™Ў . ЭЃв‹† к«‚б­Є ЭЃЛ– . ЭЃ Л– ЭЃв™¬в‹†.Лљрќ„ћв‹† в‹†" "вёќвёќ вЉ№ЛљпЅЎ р–Ґ” ајљ Лљв‚ЉВ· Hyprland п№’вёќвёќ в§Јв‚ЉЛљ Are Awsome! р–Ґ” к«‚б­Є ЭЃЛ– ."
binde = $Cmd Ctrl,  N,      exec, notify-send -u critical "бµ•М€в™ЎЛіаі«Лљв€— Haii >w< Л–в—›вЃєв‘…в™Ў . ЭЃв‹† к«‚б­Є ЭЃЛ– . ЭЃ Л– ЭЃв™¬в‹†.Лљрќ„ћв‹† в‹†" "вёќвёќ вЉ№ЛљпЅЎ р–Ґ” ајљ Лљв‚ЉВ· Hyprland п№’вёќвёќ в§Јв‚ЉЛљ Are Awsome! р–Ґ” к«‚б­Є ЭЃЛ– ."

bind  = $Cmd,       W,      exec, $f $t $s/wallpaper.sh
bind  = $Cmd Shift, W,      exec, $s/wallpaper.sh random

bindl = $Cmd Alt,   L,      exec, pidof hyprlock || hyprlock
bindl = $Cmd Shift, R,      exec, $s/reload.sh
bindl = Ctrl Alt,   Delete, exec, $s/exit.sh

## Windows
# Common
bind  = $Cmd,       Q,   killactive
bind  = Alt,        F4,  forcekillactive
bind  = $Cmd,       F,   togglefloating
bind  = $Cmd Shift, F,   fullscreenstate, 2 0
bind  = ,           F11, fullscreen
bind  = $Cmd,       C,   centerwindow
bind  = $Cmd,       S,   toggleswallow
bind  = $Cmd,       T,   pin
bind  = $Cmd,       P,   pseudo
bind  = $Cmd,       O,   layoutmsg, togglesplit

# Alt + Tab
binde = Alt,       Tab, cyclenext
binde = Alt,       Tab, alterzorder, top
binde = Alt Shift, Tab, cyclenext,   prev
binde = Alt Shift, Tab, alterzorder, top

# Mouse
bindm = $Cmd, mouse:272, movewindow
bindm = $Cmd, mouse:273, resizewindow

# Focus
binde = $Cmd, h, movefocus, l
binde = $Cmd, j, movefocus, d
binde = $Cmd, k, movefocus, u
binde = $Cmd, l, movefocus, r

# Move
binde = $Cmd Shift, h, movewindow, l
binde = $Cmd Shift, j, movewindow, d
binde = $Cmd Shift, k, movewindow, u
binde = $Cmd Shift, l, movewindow, r

# Resize
binde = $Cmd Ctrl, h, resizeactive, -25 0
binde = $Cmd Ctrl, j, resizeactive,  0  25
binde = $Cmd Ctrl, k, resizeactive,  0 -25
binde = $Cmd Ctrl, l, resizeactive,  25 0

## Workspaces Focus

# Vim-Like
binde = $Cmd Alt, j, workspace, e+1
binde = $Cmd Alt, k, workspace, e-1

# Cmd + Tab
binde = $Cmd,       Tab, workspace, e+1
binde = $Cmd Shift, Tab, workspace, e-1

# Mouse
bind = $Cmd, mouse_down, workspace, e+1
bind = $Cmd, mouse_up,   workspace, e-1

# Number
binde = $Cmd, 1, workspace, 1
binde = $Cmd, 2, workspace, 2
binde = $Cmd, 3, workspace, 3
binde = $Cmd, 4, workspace, 4
binde = $Cmd, 5, workspace, 5
binde = $Cmd, 6, workspace, 6
binde = $Cmd, 7, workspace, 7
binde = $Cmd, 8, workspace, 8
binde = $Cmd, 9, workspace, 9
binde = $Cmd, 0, workspace, 10

## Move window to workspace
# Vim-Like
binde = $Cmd Shift Alt, j, movetoworkspace, +1
binde = $Cmd Shift Alt, k, movetoworkspace, -1

# Number
bind = $Cmd Shift, 1, movetoworkspace, 1
bind = $Cmd Shift, 2, movetoworkspace, 2
bind = $Cmd Shift, 3, movetoworkspace, 3
bind = $Cmd Shift, 4, movetoworkspace, 4
bind = $Cmd Shift, 5, movetoworkspace, 5
bind = $Cmd Shift, 6, movetoworkspace, 6
bind = $Cmd Shift, 7, movetoworkspace, 7
bind = $Cmd Shift, 8, movetoworkspace, 8
bind = $Cmd Shift, 9, movetoworkspace, 9
bind = $Cmd Shift, 0, movetoworkspace, 10

## Screenshot
bindl = ,      Print, exec, hyprshot -m output -m active -t 1000 $screenshot_output
bindl = Alt,   Print, exec, hyprshot -m window -m active -t 1000 $screenshot_output
bindl = Shift, Print, exec, hyprshot -m region           -t 1000 $screenshot_output
bindl = Ctrl,  Print, exec, $s/record.sh

## Zoom
# Mouse
bind = $Cmd Ctrl, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $Cmd Ctrl, mouse_up,   exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

# +/-
binde = $Cmd, equal,       exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $Cmd, minus,       exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = $Cmd, KP_ADD,      exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $Cmd, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

# Reset
bind = $Cmd Shift, minus,       exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $Cmd Shift, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor 1

## Volume
# +/-
bindel = ,      XF86AudioRaiseVolume, exec, $s/volume.sh up
bindel = ,      XF86AudioLowerVolume, exec, $s/volume.sh down
bindel = Shift, XF86AudioRaiseVolume, exec, $s/volume.sh lup
bindel = Shift, XF86AudioLowerVolume, exec, $s/volume.sh ldown

# Mute
bindel = , XF86AudioMute,    exec, $s/volume.sh mute
bindel = , XF86AudioMicMute, exec, $s/volume.sh mic-mute

## Brightness
bindel = , XF86MonBrightnessUp,   exec, $s/brightness.sh up
bindel = , XF86MonBrightnessDown, exec, $s/brightness.sh down

## Media
bindl = , XF86AudioNext,  exec, $s/music.sh next
bindl = , XF86AudioPause, exec, $s/music.sh playpause
bindl = , XF86AudioPlay,  exec, $s/music.sh playpause
bindl = , XF86AudioPrev,  exec, $s/music.sh previous

# With normal keys
bindl = Alt $Cmd, P, exec, $s/music.sh playpause
bindl = Alt $Cmd, N, exec, $s/music.sh next
bindl = Alt $Cmd, B, exec, $s/music.sh previous

# Adjust player's volume
bindel = Alt, XF86AudioRaiseVolume, exec, $s/music.sh volup
bindel = Alt, XF86AudioLowerVolume, exec, $s/music.sh voldown
