# source configs
source = ./configs/_config.conf
source = ./configs/env.conf
source = ./configs/rule.conf
source = ./configs/layout.conf
source = ./configs/input.conf
source = ./configs/bind.conf
source = ./configs/appearance.conf
source = ./configs/autostart.conf

# nwg-displays
source = ./monitors.conf
source = ./workspaces.conf

misc {
  force_default_wallpaper  = 0
  disable_hyprland_logo    = true
  disable_splash_rendering = true

  mouse_move_enables_dpms = true
  key_press_enables_dpms  = true
}

exec-once = hyprpm reload -n
